name: diag-likeit

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test likeit API from datacenter IP
        run: |
          python3 - <<'PY'
          import json, urllib.parse, urllib.request
          # 로컬에서 공감 146으로 확인된 글
          bid, log = "meritz_partners", "224056771527"
          q = urllib.parse.quote(f"BLOG[{bid}_{log}]")
          url = f"https://blog.like.naver.com/v1/search/contents?suffix=BLOG&q={q}"
          req = urllib.request.Request(url, headers={
              "User-Agent": "Mozilla/5.0",
              "Referer": f"https://blog.naver.com/{bid}/{log}",
          })
          try:
              raw = urllib.request.urlopen(req, timeout=8).read().decode("utf-8","ignore")
              print("RAW:", raw[:500])
              data = json.loads(raw)
              reactions = data.get("contents",[{}])[0].get("reactions",[])
              print("REACTIONS:", reactions)
              print("TOTAL:", sum(int(r.get("count",0) or 0) for r in reactions))
          except Exception as e:
              print("ERROR:", repr(e))
          PY
