name: keep-streamlit-awake

# Streamlit Community Cloud 무료 플랜은 장시간 트래픽이 없으면 잠자기로 전환된다.
# 주기적으로 앱에 핑을 보내 항상 깨어 있게 유지한다.
on:
  schedule:
    - cron: "*/10 * * * *"   # 10분마다 (UTC 기준; GitHub 사정으로 다소 지연될 수 있음)
  workflow_dispatch:           # 수동 실행 버튼

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          APP="https://meritz-community-dashboard-udkr6a9trux8sztxbau3gs.streamlit.app"
          echo "health: $(curl -s -o /dev/null -w '%{http_code}' "$APP/_stcore/health" || echo fail)"
          echo "root:   $(curl -s -o /dev/null -w '%{http_code}' "$APP/" || echo fail)"
