name: collect-data

# 네이버+YouTube 반응을 주기적으로 수집해 web/data.json 으로 커밋한다.
# 커밋되면 Vercel이 자동 재배포 → 대시보드는 항상 즉시 로딩·최신.
on:
  schedule:
    - cron: "0 */8 * * *"   # 8시간마다 (UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pandas
      - name: Collect
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python collect.py
      - name: Commit data (history)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data.json
          if git diff --staged --quiet; then
            echo "변경 없음"
          else
            git commit -m "data: refresh $(date -u +%FT%TZ)"
            git push
          fi
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm i -g vercel
          vercel deploy --prod --yes --cwd web --token "$VERCEL_TOKEN"
